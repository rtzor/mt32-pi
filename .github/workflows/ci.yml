name: mt32-pi CI

on:
  push:
    branches:
      - main
      - master
      - "chore/**"
      - "fix/**"
      - "test/**"
    tags:
      - "*-ng"
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_VERSION: 14.3.rel1
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install black isort flake8

      - name: black
        run: black --check --diff scripts

      - name: isort
        run: isort --check-only --diff scripts

      - name: flake8
        run: flake8 scripts

      - name: shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          find scripts -type f -name "*.sh" -print0 | xargs -0 -r shellcheck

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y g++ make

      - name: Build and run unit tests
        run: make -C tests clean run

  build:
    runs-on: ubuntu-24.04
    name: build-${{ matrix.board }}
    strategy:
      fail-fast: false
      matrix:
        board: [pi2, pi3-64, pi4-64]

    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules
        run: make submodules

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-${{ env.TOOLCHAIN_VERSION }}-${{ matrix.board }}

      - name: Cache ARM toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-arm-none-eabi
            ~/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-aarch64-none-elf
          key: ${{ runner.os }}-arm-toolchains-${{ env.TOOLCHAIN_VERSION }}

      - name: Install toolchains if not retrieved from cache
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          set -e
          for triplet in arm-none-eabi aarch64-none-elf; do
            wget -q https://developer.arm.com/-/media/Files/downloads/gnu/${{ env.TOOLCHAIN_VERSION }}/binrel/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}.tar.xz
            tar -xf arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}.tar.xz -C ~
            rm arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}.tar.xz
          done

      - name: Update PATH and ccache wrappers
        run: |
          set -e
          mkdir -p ~/ccache_bin
          for triplet in arm-none-eabi aarch64-none-elf; do
            ln -sf "$(which ccache)" ~/ccache_bin/${triplet}-gcc
            ln -sf "$(which ccache)" ~/ccache_bin/${triplet}-g++
            echo "$HOME/ccache_bin:$HOME/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}/bin" >> "$GITHUB_PATH"
          done

      - name: Build
        run: make clean && make -j"$(nproc)" BOARD=${{ matrix.board }}

      - name: Collect built kernel
        run: |
          mkdir -p out/${{ matrix.board }}
          cp kernel*.img out/${{ matrix.board }}/

      - name: Kernel size report
        run: |
          echo "## Kernel size — ${{ matrix.board }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| File | Size (KiB) |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|------------|" >> "$GITHUB_STEP_SUMMARY"
          for f in out/${{ matrix.board }}/kernel*.img; do
            SIZE_B=$(stat -c %s "$f")
            SIZE_KiB=$(( SIZE_B / 1024 ))
            echo "| \`$(basename $f)\` | ${SIZE_KiB} |" >> "$GITHUB_STEP_SUMMARY"
            if [ "$SIZE_KiB" -gt 10240 ]; then
              echo "::warning file=$(basename $f)::$(basename $f) is ${SIZE_KiB} KiB (exceeds 10 MiB soft limit)"
            fi
          done

      - name: Upload built kernel
        uses: actions/upload-artifact@v4
        with:
          name: kernels-${{ matrix.board }}
          path: out/${{ matrix.board }}/kernel*.img

      - name: Build (HDMI console)
        run: make clean && make -j"$(nproc)" BOARD=${{ matrix.board }} HDMI_CONSOLE=1

      - name: Collect built kernel (HDMI)
        run: |
          mkdir -p out/${{ matrix.board }}-hdmi
          cp kernel*.img out/${{ matrix.board }}-hdmi/

      - name: Upload built kernel (HDMI)
        uses: actions/upload-artifact@v4
        with:
          name: kernels-${{ matrix.board }}-hdmi
          path: out/${{ matrix.board }}-hdmi/kernel*.img

  package:
    needs: [build, test]
    runs-on: ubuntu-24.04
    env:
      BOOT_HOME: external/circle-stdlib/libs/circle/boot
      WLAN_HOME: external/circle-stdlib/libs/circle/addon/wlan

    steps:
      - uses: actions/checkout@v4

      - name: Fetch submodules
        run: make submodules

      - name: Cache ARM toolchains
        id: cache-toolchains
        uses: actions/cache@v4
        with:
          path: |
            ~/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-arm-none-eabi
            ~/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-aarch64-none-elf
          key: ${{ runner.os }}-arm-toolchains-${{ env.TOOLCHAIN_VERSION }}

      - name: Install toolchains if not retrieved from cache
        if: steps.cache-toolchains.outputs.cache-hit != 'true'
        run: |
          set -e
          for triplet in arm-none-eabi aarch64-none-elf; do
            wget -q https://developer.arm.com/-/media/Files/downloads/gnu/${{ env.TOOLCHAIN_VERSION }}/binrel/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}.tar.xz
            tar -xf arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}.tar.xz -C ~
            rm arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}.tar.xz
          done

      - name: Update PATH
        run: |
          for triplet in arm-none-eabi aarch64-none-elf; do
            echo "$HOME/arm-gnu-toolchain-${{ env.TOOLCHAIN_VERSION }}-x86_64-${triplet}/bin" >> "$GITHUB_PATH"
          done

      - name: Cache boot files
        id: cache-boot-files
        uses: actions/cache@v4
        with:
          path: |
            sdcard/armstub8-rpi4.bin
            sdcard/bcm2711-rpi-4-b.dtb
            sdcard/bcm2711-rpi-400.dtb
            sdcard/bcm2711-rpi-cm4.dtb
            sdcard/bootcode.bin
            sdcard/COPYING.linux
            sdcard/fixup_cd.dat
            sdcard/fixup4cd.dat
            sdcard/LICENCE.broadcom
            sdcard/start_cd.elf
            sdcard/start4cd.elf
          key: boot-files-${{ hashFiles('external/circle-stdlib/libs/circle/boot/Makefile') }}

      - name: Cache WLAN firmware
        id: cache-wlan-firmware
        uses: actions/cache@v4
        with:
          path: sdcard/firmware
          key: wlan-firmware-${{ hashFiles('external/circle-stdlib/libs/circle/addon/wlan/firmware/Makefile') }}

      - name: Download boot files and build ARM stub if not retrieved from cache
        if: steps.cache-boot-files.outputs.cache-hit != 'true'
        run: |
          make -C "$BOOT_HOME" firmware armstub64
          cp "$BOOT_HOME"/armstub8-rpi4.bin \
             "$BOOT_HOME"/bcm2711-rpi-4-b.dtb \
             "$BOOT_HOME"/bcm2711-rpi-400.dtb \
             "$BOOT_HOME"/bcm2711-rpi-cm4.dtb \
             "$BOOT_HOME"/bootcode.bin \
             "$BOOT_HOME"/COPYING.linux \
             "$BOOT_HOME"/fixup_cd.dat \
             "$BOOT_HOME"/fixup4cd.dat \
             "$BOOT_HOME"/LICENCE.broadcom \
             "$BOOT_HOME"/start_cd.elf \
             "$BOOT_HOME"/start4cd.elf \
             sdcard

      - name: Download WLAN firmware if not retrieved from cache
        if: steps.cache-wlan-firmware.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdcard/firmware
          make -C "$WLAN_HOME/firmware"
          cp "$WLAN_HOME"/firmware/*.{bin,txt,clm_blob} sdcard/firmware/
          # Circle Step50.1 WLAN firmware Makefile no longer provides LICENCE.broadcom_bcm43xx.
          # Copy it only if present to stay compatible with older/newer revisions.
          if [ -f "$WLAN_HOME/firmware/LICENCE.broadcom_bcm43xx" ]; then
            cp "$WLAN_HOME/firmware/LICENCE.broadcom_bcm43xx" sdcard/firmware/
          fi

      - name: Cache GeneralUser GS SoundFont
        id: cache-generaluser-gs
        uses: actions/cache@v4
        with:
          path: GeneralUser GS v1.511
          key: generaluser-gs-1.511

      - name: Download GeneralUser GS SoundFont if not retrieved from cache
        if: steps.cache-generaluser-gs.outputs.cache-hit != 'true'
        run: |
          set -e
          python -m pip install gdown
          # TODO(ng): Replace Google Drive with a stable direct URL/mirror for GeneralUser GS v1.511.
          # Current gdown source is flaky due to Drive permission/rate-limit changes.
          if python -m gdown -q https://drive.google.com/uc?id=1ypgJwuHqqXx-jeCXLRFqgBAEemJZnDrj; then
            unzip "GeneralUser GS v1.511.zip"
          else
            echo "WARNING: GeneralUser GS download failed (Google Drive unavailable). Continuing without bundled SoundFont."
            mkdir -p "GeneralUser GS v1.511"
          fi

      - name: Retrieve built kernels
        uses: actions/download-artifact@v4
        with:
          pattern: kernels-*
          merge-multiple: true
          path: sdcard

      - name: Add extra files to SD card directory
        run: |
          mkdir -p sdcard/docs sdcard/soundfonts
          if [ -f "GeneralUser GS v1.511/GeneralUser GS v1.511.sf2" ]; then
            cp "GeneralUser GS v1.511/GeneralUser GS v1.511.sf2" sdcard/soundfonts
          else
            echo "WARNING: GeneralUser GS v1.511.sf2 not found; packaging without bundled SoundFont."
          fi
          if [ -f "GeneralUser GS v1.511/CHANGELOG.md" ]; then
            cp "GeneralUser GS v1.511/CHANGELOG.md" sdcard/docs/CHANGELOG.GeneralUserGS
          fi
          if [ -f "GeneralUser GS v1.511/LICENSE.txt" ]; then
            cp "GeneralUser GS v1.511/LICENSE.txt" sdcard/docs/LICENSE.GeneralUserGS
          fi
          cp LICENSE sdcard/docs
          cp README.md sdcard/docs

      - name: Build release zip
        id: package
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="snapshot-${GITHUB_SHA::7}"
          fi
          ZIP_NAME="mt32-pi-${VERSION}.zip"
          (cd sdcard && zip -r "../${ZIP_NAME}" .)
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload SD card archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdcard
          path: sdcard

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: ${{ steps.package.outputs.zip_name }}

  release:
    needs: package
    runs-on: ubuntu-24.04
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && endsWith(github.ref_name, '-ng')
    permissions:
      contents: write

    steps:
      - name: Download release zip artifact
        uses: actions/download-artifact@v4
        with:
          name: release-zip
          path: .

      - name: Publish GitHub Release (fork)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ZIP_FILE="$(ls -1 mt32-pi-*.zip | head -n 1)"
          TAG="${GITHUB_REF_NAME}"
          TITLE="mt32-pi ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ZIP_FILE" --clobber
          else
            gh release create "$TAG" "$ZIP_FILE" --title "$TITLE" --generate-notes
          fi
